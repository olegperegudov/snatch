<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="header-left">
      <span id="status-dot" class="dot offline"></span>
      <span class="header-title">snatch</span>
    </div>
    <div class="header-right">
      <span id="port-label" class="port-label">:9111</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="downloads">downloads</button>
    <button class="tab" data-tab="completed">completed</button>
    <button class="tab" data-tab="settings">settings</button>
  </nav>

  <!-- Downloads panel -->
  <div id="tab-downloads" class="panel">
    <div id="queue-list"></div>
    <div id="queue-empty" class="empty">No active downloads</div>
  </div>

  <!-- Completed panel -->
  <div id="tab-completed" class="panel hidden">
    <div class="search-row">
      <input type="text" id="completed-search" placeholder="search...">
      <button id="open-folder-btn" title="Open download folder">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
        </svg>
      </button>
    </div>
    <div id="completed-list"></div>
    <div id="completed-empty" class="empty">Empty</div>
  </div>

  <!-- Settings panel -->
  <div id="tab-settings" class="panel hidden">
    <div class="settings-body">
      <label>
        Download folder
        <input type="text" id="s-download-dir" placeholder="C:\Users\you\Downloads">
      </label>
      <label>
        Preferred resolution
        <select id="s-resolution">
          <option value="best">Best available</option>
          <option value="1080">1080p</option>
          <option value="720">720p</option>
          <option value="480">480p</option>
        </select>
      </label>
      <label class="check-row">
        <input type="checkbox" id="s-filter-res">
        Show only preferred resolution
      </label>
      <label class="check-row">
        <input type="checkbox" id="s-skip-downloaded" checked>
        Skip already downloaded
      </label>
      <label>
        Max parallel downloads
        <input type="number" id="s-max-concurrent" min="1" max="10" value="2">
      </label>
      <button id="s-save">save</button>
      <div id="s-status"></div>
    </div>
  </div>

  <!-- Log panel -->
  <div id="log" class="log-panel">
    <div id="log-entries"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
