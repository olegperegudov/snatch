<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <nav class="tabs">
      <button class="tab active" data-tab="downloads">Downloads</button>
      <button class="tab" data-tab="completed">Completed</button>
    </nav>
    <div class="header-right">
      <span id="status-dot" class="dot offline" title="Daemon offline"></span>
      <button id="settings-btn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- Companion banner -->
  <div id="companion-banner" class="banner hidden">
    <span id="banner-text">Companion app not found</span>
    <a id="banner-link" class="banner-btn" target="_blank">Get Companion</a>
  </div>

  <!-- Downloads -->
  <div id="tab-downloads" class="panel">
    <div id="detected-list"></div>
    <div id="detected-empty" class="empty">No streams on this page</div>
    <hr class="section-divider">
    <div id="queue-list"></div>
    <div id="queue-empty" class="empty">No downloads yet</div>
  </div>

  <!-- Completed -->
  <div id="tab-completed" class="panel hidden">
    <div class="search-row">
      <input type="text" id="completed-search" placeholder="Search..." autocomplete="off">
      <button id="open-folder-btn" title="Open download folder">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      </button>
    </div>
    <div id="completed-list"></div>
    <div id="completed-empty" class="empty">No downloads yet</div>
  </div>

  <!-- Settings -->
  <div id="settings" class="panel hidden">
    <div class="settings-body">
      <div class="setting-row update-row">
        <a id="version-link" class="version-label" target="_blank"></a>
        <button id="check-update-btn" class="check-update-btn">check update</button>
      </div>
      <div class="setting-row">
        <span>Auto-download</span>
        <label class="toggle">
          <input type="checkbox" id="auto-dl" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-row">
        <span>Only show selected resolution</span>
        <label class="toggle">
          <input type="checkbox" id="s-filter-res">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-row">
        <span>Skip already downloaded</span>
        <label class="toggle">
          <input type="checkbox" id="s-skip-downloaded">
          <span class="toggle-track"></span>
        </label>
      </div>
      <label><span>Resolution</span>
        <select id="s-resolution">
          <option value="best">Best</option>
          <option value="1080p">1080p</option>
          <option value="720p" selected>720p</option>
          <option value="480p">480p</option>
        </select>
      </label>
      <label><span>Download folder</span>
        <div class="dir-wrapper">
          <input type="text" id="s-download-dir" placeholder="~/Downloads">
          <div id="dir-history" class="dir-history hidden"></div>
        </div>
      </label>
      <label><span>Max parallel</span>
        <input type="number" id="s-max-concurrent" min="1" max="10" value="2">
      </label>
      <button id="s-save">Save</button>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
