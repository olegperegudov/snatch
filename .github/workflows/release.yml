name: Release Snatch

on:
  push:
    tags:
      - "v*"

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend deps
        working-directory: companion
        run: npm install

      - name: Download yt-dlp
        run: |
          New-Item -ItemType Directory -Force -Path companion\src-tauri\binaries
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "companion\src-tauri\binaries\yt-dlp-x86_64-pc-windows-msvc.exe"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: companion
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Snatch ${{ github.ref_name }}"
          releaseBody: "Download the installer below to install or update Snatch."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

  release-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: release-windows
    steps:
      - uses: actions/checkout@v4

      - name: Package mini extension
        run: |
          cd extension-mini
          zip -r ../snatch-extension.zip . -x ".*"

      - name: Upload extension to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} snatch-extension.zip --clobber
