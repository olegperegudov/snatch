name: Build Snatch

on:
  push:
    branches: [main]
    paths:
      - "companion/**"
      - "extension-mini/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend deps
        working-directory: companion
        run: npm install

      - name: Download yt-dlp
        run: |
          New-Item -ItemType Directory -Force -Path companion\src-tauri\binaries
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "companion\src-tauri\binaries\yt-dlp-x86_64-pc-windows-msvc.exe"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: companion
          tauriScript: npx tauri

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: snatch-windows
          path: companion/src-tauri/target/release/bundle/nsis/*.exe
